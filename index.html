
<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Golden Acceso: Servicios de Oro</title>
    
    <link rel="manifest" href="/manifest.json" />
    
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Golden" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Golden Acceso" />
    <meta name="theme-color" content="#050505" />
    
    <link rel="icon" type="image/png" href="/icon-192.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              gold: {
                50: '#fbf8eb', 100: '#f4ecce', 200: '#ead79d', 300: '#ddbc64',
                400: '#D4AF37', 500: '#c2962d', 600: '#a87724', 700: '#865920',
                800: '#714a20', 900: '#623f1f',
              },
              obsidian: '#050505',
              platinum: '#E5E4E2'
            },
            fontFamily: {
              heading: ['Cinzel', 'serif'],
              sans: ['Montserrat', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
            }
          }
        }
      }
    </script>

    <style type="text/css">
      :root { color-scheme: dark; }
      body { 
        background-color: #050505; 
        margin: 0; 
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: contain;
        user-select: none;
        font-family: 'Cinzel', serif;
      }
      .vignette-overlay { background: radial-gradient(circle, transparent 20%, #050505 150%); }
      .text-gold-metallic {
        background: linear-gradient(to bottom, #f4ecce 0%, #D4AF37 50%, #a87724 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      ::-webkit-scrollbar { width: 0px; }
      .custom-scrollbar::-webkit-scrollbar {
        width: 3px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.02);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(212, 175, 55, 0.3);
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(212, 175, 55, 0.5);
      }
    </style>

  <link rel="stylesheet" href="/src/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main-entry.tsx"></script>
  </body>
</html>
